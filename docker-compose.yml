services:
  db:
    image: postgres:15
    container_name: diva_invoice_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: diva
      POSTGRES_DB: invoice_intelligence
    ports:
      - "5432:5432"
    volumes:
      - diva_pg_data:/var/lib/postgresql/data

volumes:
  diva_pg_data: